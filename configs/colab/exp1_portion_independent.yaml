data:
  cafe1_csv: /content/drive/MyDrive/nutrition5k/data/metadata/dish_metadata_cafe1.csv
  cafe2_csv: /content/drive/MyDrive/nutrition5k/data/metadata/dish_metadata_cafe2.csv
  pre_resized: true
  preload_ram: true
  side_angle_root: /dev/shm/side_angles
  test_ids_txt: /content/drive/MyDrive/nutrition5k/data/splits/rgb_test_ids.txt
  train_ids_txt: /content/drive/MyDrive/nutrition5k/data/splits/rgb_train_ids.txt
  use_depth: false
  val_ratio: 0.1
model:
  mode: per_gram
  tasks:
  - cal_per_g
  - fat_per_g
  - carb_per_g
  - protein_per_g
  type: multitask
training:
  alpha: 0.9
  batch_size: 256
  checkpoint_dir: /content/drive/MyDrive/nutrition5k/checkpoints/exp1
  early_stopping_patience: 15
  eps: 1.0
  freeze_backbone_epochs: 10
  head_lr: 0.001
  lr: 0.0003
  lr_factor: 0.5
  lr_min: 1.0e-06
  lr_patience: 5
  max_epochs: 10000
  momentum: 0.9
  num_workers: 10
  optimizer: adam
  weight_decay: 0.0001
